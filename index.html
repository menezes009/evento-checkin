<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Scanner Evento</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:black;
color:white;
text-align:center;
}

#reader{
width:320px;
margin:auto;
margin-top:40px;
}

#status{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
font-weight:bold;
}

.green{
background:#00c853;
}

.red{
background:#d50000;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<h1>Scanner do Evento</h1>

<div id="reader"></div>

<div id="status" class="hidden"></div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwhdLjEQouDWwfLYCbEPW-cledqSNPf9oooZMOSOqb2viMRoTxlgFA_D6eBgXB-rlYN/exec"

function mostrarTela(cor,texto){

let status = document.getElementById("status")

status.className = cor
status.innerText = texto

setTimeout(()=>{
status.className="hidden"
},2000)

}

function onScanSuccess(decodedText){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({codigo:decodedText})
})

.then(res=>res.text())
.then(res=>{

if(res=="OK"){

mostrarTela("green","ENTRADA LIBERADA")

}

else if(res=="LIMITE"){

mostrarTela("red","ACOMPANHANTE ESGOTADO")

}

else{

mostrarTela("red","QR INVÁLIDO")

}

})

}

let scanner = new Html5QrcodeScanner("reader",{fps:10,qrbbox:250})

scanner.render(onScanSuccess)

</script>

</body>

</html>
