<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Portaria Evento</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

input{
font-size:22px;
padding:10px;
width:300px;
margin-top:20px;
}

.result{
margin-top:30px;
}

img{
width:200px;
border-radius:12px;
}

button{
margin-top:10px;
padding:12px 20px;
font-size:18px;
background:#00c853;
border:none;
color:white;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Portaria</h1>

<input id="search" placeholder="Digite o nome">

<div id="results"></div>

<script>

let convidados=[]

fetch("https://script.google.com/macros/s/AKfycbwDJQ43LBrq35AJv09D9l6eSewvtPr5CFeW1IynURVbkosGWV_wdtT4R95Z-5TXdgcj2Q/exec")
.then(r=>r.json())
.then(data=>convidados=data)

document.getElementById("search").addEventListener("input",function(){

let termo=this.value.toLowerCase()

let lista=convidados.filter(p=>p.nome.toLowerCase().includes(termo))

let html=""

lista.forEach(p=>{

html+=`
<div class="result">
<img src="${p.foto}" style="width:200px;border-radius:10px;" referrerpolicy="no-referrer">
<h2>${p.nome}</h2>
<button onclick="checkin('${p.nome}')">Liberar entrada</button>
</div>
`

})

document.getElementById("results").innerHTML=html

})

function checkin(nome){

alert("Entrada liberada para "+nome)

}

</script>

</body>
</html>
