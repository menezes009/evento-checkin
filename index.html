<script>

let convidados = [];

fetch("https://script.google.com/macros/s/AKfycbxTDXjL5QeonoS46RrAbD8H0aPAyF1xU7Ub4Yf3aDfA7Co0QUPrbJKMQR9idzt-nIRIHA/exec")
.then(response => response.json())
.then(data => {
    convidados = data;
});

document.getElementById("search").addEventListener("input", function(){

    let termo = this.value.toLowerCase();

    let resultados = convidados.filter(p => 
        p.nome.toLowerCase().includes(termo)
    );

    let html = "";

    resultados.forEach(p => {

        html += `
        <div class="result">

            <img src="${p.foto}" style="width:220px;border-radius:12px;">

            <h2>${p.nome}</h2>

            <button onclick="checkin('${p.nome}')">
            Liberar entrada
            </button>

        </div>
        `;

    });

    document.getElementById("results").innerHTML = html;

});

function checkin(nome){
    alert("Entrada liberada para " + nome);
}

</script>
