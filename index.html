<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Scanner Evento</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:black;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

#reader{
width:320px;
margin:auto;
margin-top:30px;
}

#status{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:bold;
z-index:999;
}

.green{
background:#00c853;
}

.red{
background:#d50000;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<h1>Scanner do Evento</h1>

<div id="reader"></div>

<div id="status" class="hidden"></div>

<script>

const SCRIPT_URL="const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwhdLjEQouDWwfLYCbEPW-cledqSNPf9oooZMOSOqb2viMRoTxlgFA_D6eBgXB-rlYN/exec""

function mostrar(cor,texto){

let tela=document.getElementById("status")

tela.className=cor
tela.innerText=texto

setTimeout(()=>{
tela.className="hidden"
},2000)

}

function onScanSuccess(decodedText){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({codigo:decodedText})
})
.then(res=>res.text())
.then(res=>{

if(res=="OK"){

mostrar("green","ENTRADA LIBERADA")

}

else if(res=="LIMITE"){

mostrar("red","ACOMPANHANTE ESGOTADO")

}

else{

mostrar("red","QR INVÁLIDO")

}

})

}

function iniciarScanner(){

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode: "environment" },
{
fps:10,
qrbox:250
},
onScanSuccess
);

}

iniciarScanner()

</script>

</body>

</html>
