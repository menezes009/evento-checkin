<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Scanner Evento</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:black;
color:white;
text-align:center;
}

#reader{
width:320px;
margin:auto;
margin-top:40px;
}

#status{
font-size:40px;
margin-top:20px;
padding:20px;
border-radius:10px;
}

.green{
background:green;
}

.red{
background:red;
}

</style>

</head>

<body>

<h1>Scanner da Portaria</h1>

<div id="status">Aguardando QR...</div>

<div id="reader"></div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwhdLjEQouDWwfLYCbEPW-cledqSNPf9oooZMOSOqb2viMRoTxlgFA_D6eBgXB-rlYN/exec"

function onScanSuccess(decodedText){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({codigo:decodedText})
})

.then(res=>res.text())
.then(res=>{

let status = document.getElementById("status")

if(res=="OK"){

status.className="green"
status.innerText="ENTRADA LIBERADA"

}

else if(res=="LIMITE"){

status.className="red"
status.innerText="LIMITE ATINGIDO"

}

else{

status.className="red"
status.innerText="QR INVÁLIDO"

}

})

}

let scanner = new Html5QrcodeScanner("reader",{fps:10,qrbbox:250})

scanner.render(onScanSuccess)

</script>

</body>
</html>
