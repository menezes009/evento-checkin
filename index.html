<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Portaria Evento</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{
margin-top:40px;
}

#contador{
margin-top:10px;
font-size:20px;
color:#00e676;
}

#search{
font-size:22px;
padding:12px;
width:300px;
margin-top:20px;
border-radius:8px;
border:none;
}

.result{
margin-top:30px;
}

img{
width:220px;
border-radius:14px;
margin-top:10px;
}

button{
margin-top:10px;
padding:14px 24px;
font-size:18px;
background:#00c853;
border:none;
color:white;
border-radius:8px;
}

button:disabled{
background:#555;
}

video{
margin-top:30px;
border-radius:12px;
}

</style>

</head>

<body>

<h1>Portaria</h1>

<div id="contador">Pessoas no evento: 0</div>

<input id="search" placeholder="Digite o nome">

<br>

<video id="camera" width="300" height="220" autoplay muted></video>

<div id="results"></div>

<script>

let convidados = []
let total = 0

async function carregar(){

let res = await fetch("https://script.google.com/macros/s/AKfycbxTDXjL5QeonoS46RrAbD8H0aPAyF1xU7Ub4Yf3aDfA7Co0QUPrbJKMQR9idzt-nIRIHA/exec")

convidados = await res.json()

console.log(convidados)

}

carregar()

document.getElementById("search").addEventListener("input",function(){

let termo = this.value.toLowerCase()

let lista = convidados.filter(p =>
p.nome.toLowerCase().includes(termo)
)

let html = ""

lista.forEach(p=>{

html += `
<div class="result">

<img src="${p.foto}">

<h2>${p.nome}</h2>

<button onclick="checkin('${p.nome}')">
Liberar entrada
</button>

</div>
`

})

document.getElementById("results").innerHTML = html

})

function checkin(nome){

fetch("https://script.google.com/macros/s/AKfycbxTDXjL5QeonoS46RrAbD8H0aPAyF1xU7Ub4Yf3aDfA7Co0QUPrbJKMQR9idzt-nIRIHA/exec",{
method:"POST",
body:JSON.stringify({nome:nome})
})

total++

document.getElementById("contador").innerText =
"Pessoas no evento: " + total

alert("Entrada registrada para " + nome)

}

// CAMERA (para reconhecimento facial)

async function iniciarCamera(){

let video = document.getElementById("camera")

let stream = await navigator.mediaDevices.getUserMedia({
video:true
})

video.srcObject = stream

}

iniciarCamera()

</script>

</body>
</html>
