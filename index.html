<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Painel Evento</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.box{
background:#222;
padding:20px;
margin:20px;
border-radius:10px;
font-size:30px;
}

button{
padding:15px;
font-size:18px;
}

</style>

</head>

<body>

<h1>Painel do Evento</h1>

<div class="box">
Entradas: <span id="total">0</span>
</div>

<div class="box">
Acompanhantes: <span id="acomp">0</span>
</div>

<button onclick="reset()">Reiniciar Evento</button>

<script>

const SCRIPT="https://script.google.com/macros/s/AKfycbwhdLjEQouDWwfLYCbEPW-cledqSNPf9oooZMOSOqb2viMRoTxlgFA_D6eBgXB-rlYN/exec"

function carregar(){

fetch(SCRIPT)
.then(r=>r.json())
.then(d=>{

let total=0
let acomp=0

d.forEach(p=>{

total+=p.entradas

if(p.entradas>1){
acomp+=p.entradas-1
}

})

document.getElementById("total").innerText=total
document.getElementById("acomp").innerText=acomp

})

}

function reset(){

fetch(SCRIPT,{
method:"POST",
body:JSON.stringify({reset:true})
})

alert("Evento reiniciado")

}

setInterval(carregar,3000)

carregar()

</script>

</body>

</html>
